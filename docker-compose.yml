services:
  deploywhisper:
    # If you want to use the already published image, uncomment the "image" section and comment out the build section.
    # image: ghcr.io/pramodksahoo/deploywhisper:1.0.0
    build:
      context: .
      target: runtime
    ports:
      - "8080:8080"
    restart: unless-stopped
    init: true
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      LOG_LEVEL: INFO
      DATABASE_URL: sqlite:///data/deploywhisper.db
      DEPLOYWHISPER_SHARE_TOKEN: ${DEPLOYWHISPER_SHARE_TOKEN:-}
      LLM_PROVIDER: ollama
      LLM_MODEL: ollama/llama3
      LLM_API_BASE: ${LLM_API_BASE:-http://host.docker.internal:11434}
      LLM_API_KEY: ${LLM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
    volumes:
      - deploywhisper-data:/app/data

volumes:
  deploywhisper-data:
