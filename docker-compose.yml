services:
  deploywhisper:
    build:
      context: .
      target: runtime
    ports:
      - "8080:8080"
    restart: unless-stopped
    init: true
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      LOG_LEVEL: INFO
      DATABASE_URL: sqlite:///data/deploywhisper.db
      LLM_PROVIDER: ollama
      LLM_MODEL: ollama/llama3
      LLM_API_BASE: ${LLM_API_BASE:-http://host.docker.internal:11434}
    volumes:
      - deploywhisper-data:/app/data

volumes:
  deploywhisper-data:
