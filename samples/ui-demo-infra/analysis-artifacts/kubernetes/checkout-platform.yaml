apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: demo-prod
  labels:
    app: checkout-api
    tier: application
spec:
  replicas: 4
  selector:
    matchLabels:
      app: checkout-api
  template:
    metadata:
      labels:
        app: checkout-api
    spec:
      serviceAccountName: checkout-api
      containers:
        - name: checkout-api
          image: ghcr.io/example/checkout-api:2026.05.22
          ports:
            - containerPort: 8080
          env:
            - name: FEATURE_PAYMENT_ROUTING
              value: "enabled"
            - name: PAYMENT_WORKER_ENDPOINT
              value: "http://payments-worker.demo-prod.svc.cluster.local:8080"
          securityContext:
            privileged: true
            runAsUser: 0
            allowPrivilegeEscalation: true
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-api
  namespace: demo-prod
  labels:
    app: checkout-api
spec:
  type: LoadBalancer
  selector:
    app: checkout-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: checkout-web
  namespace: demo-prod
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  ingressClassName: public-nginx
  rules:
    - host: checkout.demo.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: checkout-api
                port:
                  number: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-worker
  namespace: demo-prod
  labels:
    app: payments-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments-worker
  template:
    metadata:
      labels:
        app: payments-worker
    spec:
      containers:
        - name: payments-worker
          image: ghcr.io/example/payments-worker:2026.05.22
          env:
            - name: PAYMENT_GATEWAY_MODE
              value: "live"
          ports:
            - containerPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: checkout-allow-all-egress
  namespace: demo-prod
spec:
  podSelector:
    matchLabels:
      app: checkout-api
  policyTypes:
    - Egress
  egress:
    - {}
